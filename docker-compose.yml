services:
  # CONTAINER API
  api:
    build:
      context: .
      dockerfile: Training/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: "Server=db;Database=${DB_NAME};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=true"

      AppSettings__PasswordPepper: "${PASSWORD_PEPPER}"

      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Jwt__AccessTokenExpiresMin: "${JWT_ACCESS_TOKEN_EXPIRES_MIN}"
      Jwt__RefreshTokenExpiresMin: "${JWT_REFRESH_TOKEN_EXPIRES_MIN}"
    depends_on: # LOAD DB CONTAINER AND INIT DB FIRST
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # CONTAINER DB
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost,1433 -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # INIT DB
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      DB_NAME: "${DB_NAME}"
    volumes:
      - ./db/scripts:/db/scripts:ro
      - ./db/init-db.sh:/db/init-db.sh:ro
    entrypoint: ["/bin/bash", "/db/init-db.sh"]
    command: |
    restart: "no"

volumes:
  sqlserver_data:
